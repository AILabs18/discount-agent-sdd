# PR checks: build, unit test, and integration test only (no SDD verifier, no deploy).

name: pull-request

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.lock

      - name: Build wheel artifact
        run: |
          python -m pip install build
          python -m build --wheel --outdir dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-wheel-pr
          path: dist/*

  unit-test:
    runs-on: ubuntu-latest
    needs: build
    env:
      AGENT_DISABLE_PAID_LLM: "true"
      PRICING_AGENT_FALLBACK: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.lock

      - name: Run unit tests
        run: python -m pytest -v tests/unit

  integration-test:
    runs-on: ubuntu-latest
    needs: build
    env:
      AGENT_DISABLE_PAID_LLM: "true"
      PRICING_AGENT_FALLBACK: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.lock

      - name: Run integration tests
        run: python -m pytest -v tests/integration
