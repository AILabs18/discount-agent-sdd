# Full CI: runs after merge to main (push to main).
# build -> unit-test & integration-test -> sdd-verifier -> deploy (dummy)

name: ci-main-pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.lock

      - name: Build wheel artifact
        run: |
          python -m pip install build
          python -m build --wheel --outdir dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-wheel
          path: dist/*

  unit-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.lock

      - name: Run unit tests
        run: python -m pytest -v tests/unit

  integration-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.lock

      - name: Run integration tests
        run: python -m pytest -v tests/integration

  sdd-verifier:
    runs-on: ubuntu-latest
    needs:
      - unit-test
      - integration-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.lock

      - name: Run SDD verifier
        run: python verifier.py

  deploy:
    runs-on: ubuntu-latest
    needs: sdd-verifier
    steps:
      - name: Dummy deploy step
        run: |
          echo "Deploy job placeholder (no target environment configured)."
